<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Facturas JSON</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        form { width: 400px; border: 1px solid black; padding: 20px; }
        label { display: inline-block; width: 150px; margin-bottom: 10px; }
        input { margin-bottom: 10px; }
        h3 { text-decoration: underline; }
        .boton { margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Nueva Factura</h2>
    <form id="invoiceForm">
        <h3>Datos Emisor</h3>
        <label>Nombre:</label> <input type="text" id="emisor_nombre" required><br>
        <label>CIF/NIF:</label> <input type="text" id="emisor_id" required>

        <h3>Datos Receptor</h3>
        <label>Nombre Cliente:</label> <input type="text" id="receptor_nombre" required><br>
        <label>CIF/NIF Cliente:</label> <input type="text" id="receptor_id" required>

        <h3>Concepto</h3>
        <label>Descripción:</label> <input type="text" id="desc" required><br>
        <label>Precio Base:</label> <input type="number" id="precio"  required><br>
        <label>% Impuesto:</label> <input type="number" id="iva" value="21" required>

        <br>
        <button type="submit" class="boton">Generar y Descargar JSON</button>
    </form>

<script>
    document.getElementById('invoiceForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var fechaEmision = new Date();
        var fechaVencimiento = new Date();
        fechaVencimiento.setMonth(fechaEmision.getMonth() + 1);

        var precioBase = parseFloat(document.getElementById('precio').value);
        var iva = parseFloat(document.getElementById('iva').value);
        var total = precioBase + (precioBase * (iva / 100));

        var uuid = self.crypto.randomUUID();
        var hash = "";
        var caracteres = "abcdef0123456789";
        for (var i = 0; i < 32; i++) {
            hash += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }

        var factura = {
            id: uuid,
            emisor: {
                nombre: document.getElementById('emisor_nombre').value,
                identificacion: document.getElementById('emisor_id').value
            },
            receptor: {
                nombre: document.getElementById('receptor_nombre').value,
                identificacion: document.getElementById('receptor_id').value
            },
            conceptos: {
                descripcion: document.getElementById('desc').value,
                precio_base: precioBase,
                impuesto_aplicado: iva + "%",
                precio_total: total.toFixed(2)
            },
            metadata: {
                fecha_emision: fechaEmision.toLocaleDateString(),
                fecha_fin_cobro: fechaVencimiento.toLocaleDateString(),
                estado: Math.floor(Math.random() * 5) + 1,
                hash: hash
            }
        };

        var datosJson = JSON.stringify(factura, null, 4);
        var enlace = document.createElement('a');
        enlace.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(datosJson);
        enlace.download = "factura_nueva.json";
        enlace.click();
    });
</script>

</body>
</html>
